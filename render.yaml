# Render Blueprint for the NGW Events API (FastAPI comms backend).
# Deploy: Render Dashboard → New → Blueprint → pick this repo.
# Render will prompt you to fill the secret env vars (sync:false) — never commit secrets.
services:
  - type: web
    name: ngw-events-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # ── Secrets — you enter these in the Render dashboard (never in git) ──
      - key: DATABASE_URL            # Supabase → Settings → Database → Connection string (pooler)
        sync: false
      - key: RESEND_API_KEY          # Resend → API Keys
        sync: false
      - key: COMMUNICATION_EMAIL_FROM # e.g. events@yourdomain.com (verified in Resend)
        sync: false
      - key: PLANNER_DEV_TOKEN       # local-dev shorthand only; IGNORED in deployment
        sync: false                   # unless ALLOW_DEV_TOKEN=true is ALSO set (do NOT set in prod)
      # SECURITY: Do NOT add ALLOW_DEV_TOKEN here. It must remain unset in every
      # deployed environment so the X-Planner-Token bypass cannot be used in prod.
      # ── Supabase Auth (planner sign-in) — non-secret project values ──
      - key: SUPABASE_URL            # Supabase → Settings → API → Project URL
        sync: false
      - key: SUPABASE_ANON_KEY       # Supabase → Settings → API → anon / publishable key
        sync: false
      # ── Non-secret config ──
      - key: PYTHON_VERSION          # pin a stable Python (3.14 has no pydantic-core wheels yet)
        value: 3.12.7
      - key: ALLOWED_ORIGINS        # comma-separated production origins; add your
        value: https://twillis45.github.io,http://localhost:3000  # custom domain here, or set to * to allow any
      # Optional: override the default localhost/LAN-IP allow regex.
      # - key: ALLOWED_ORIGIN_REGEX
      #   value: https?://(localhost|192\.168(?:\.\d{1,3}){2})(?::\d+)?
      - key: APP_BASE_URL
        value: https://twillis45.github.io/ngw-event-planner
